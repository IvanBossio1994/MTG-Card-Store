spring.application.name=tcg-inventory-bot
server.address=127.0.0.1

# Carpeta local de datos/configuracion.
# Por default queda dentro del proyecto clonado en ./data, que esta ignorado por Git.
# Se puede cambiar con la variable de entorno TCG_INVENTORY_DATA_DIR.
app.storage-dir=${TCG_INVENTORY_DATA_DIR:./data}
google.credentials.path=${app.storage-dir}/google-credentials.json
google.service-account-email=tcg-bot-service@tcg-inventory-bot.iam.gserviceaccount.com

# Regla de precio: CK USD por cotizacion, redondeado hacia arriba al multiplo configurado.
pricing.ck-dollar-rate=1650.0
pricing.round-multiple=500

# Inventario inicial. El repo clonado arranca sin Sheet para que cada tienda configure el suyo.
store.default-spreadsheet-id=
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=23MB
