spring.application.name=tcg-inventory-bot
server.address=127.0.0.1

# Carpeta local de datos/configuracion. Se usa D: para no exigir el disco C.
app.storage-dir=D:/TCG-inventory/data
google.credentials.path=${app.storage-dir}/google-credentials.json
ck.cache-file=${app.storage-dir}/cache/ck-pricelist.json

# Regla de precio: CK USD por cotizacion, redondeado hacia arriba al multiplo configurado.
pricing.ck-dollar-rate=1650.0
pricing.round-multiple=500

# Inventario inicial; cada tienda puede reemplazarlo desde la pantalla Mi tienda.
store.default-spreadsheet-id=1ZKbQEahy_d4kCawiA83KdTDVrOUcT5ZSk6_HFO9oeII
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=23MB
