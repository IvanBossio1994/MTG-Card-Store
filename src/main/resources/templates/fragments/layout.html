<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar(subtitle)" class="topbar">
    <div class="topbar-start">
        <button id="menu-button" class="menu-button" type="button" aria-label="Abrir menu"
                aria-controls="app-menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <a class="brand" th:href="@{/}" aria-label="Volver al inicio">
            <img class="brand-logo" th:if="${hasStoreLogo}" th:src="@{/configuracion/logo}" alt="">
            <span class="brand-mark" th:unless="${hasStoreLogo}">TCG</span>
            <div>
                <strong th:text="${storeName}">Inventory Manager</strong>
                <p th:text="${subtitle}">Card Kingdom + Google Sheets</p>
            </div>
        </a>
    </div>
</header>

<div th:fragment="menu(active)">
    <div id="menu-backdrop" class="menu-backdrop" hidden></div>
    <aside id="app-menu" class="app-menu" aria-hidden="true">
        <div class="menu-head">
            <span class="brand-mark">TCG</span>
            <strong>Inventory Manager</strong>
        </div>
        <nav class="menu-nav" aria-label="Menu principal">
            <a th:classappend="${active == 'home'} ? 'active'" th:href="@{/}">Inicio</a>
            <a th:classappend="${active == 'settings'} ? 'active'" th:href="@{/configuracion}">Configuracion</a>
            <a class="movement-menu-link" th:classappend="${active == 'movements'} ? ' active'" th:href="@{/movimientos}">
                <span>Movimientos</span>
                <span class="menu-lock-icon"
                      th:classappend="${movementsUnlocked} ? ' unlocked' : ' locked'"
                      th:title="${movementsUnlocked ? 'Acceso habilitado' : 'Acceso bloqueado'}"
                      th:attr="aria-label=${movementsUnlocked ? 'Acceso habilitado' : 'Acceso bloqueado'}"
                      role="img">
                    <svg th:if="${movementsUnlocked}" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 7V6a4 4 0 0 0-7.7-1.5"/>
                        <rect x="5" y="10" width="14" height="10" rx="2"/>
                        <path d="M12 14v2"/>
                    </svg>
                    <svg th:unless="${movementsUnlocked}" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 10V8a5 5 0 0 1 10 0v2"/>
                        <rect x="5" y="10" width="14" height="10" rx="2"/>
                        <path d="M12 14v2"/>
                    </svg>
                </span>
            </a>
            <a th:classappend="${active == 'import'} ? 'active'" th:href="@{/importar-lista}">Importar lista</a>
            <form th:action="@{/tutorial/reset}" method="post">
                <button type="submit" class="menu-link-button">Tutorial</button>
            </form>
        </nav>
    </aside>
</div>

<div th:fragment="loading(title, message)" id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-card" role="status" aria-live="polite">
        <img class="loading-cat" th:src="@{/images/cat-card-loader.gif}"
             alt="Gatito atigrado revisando cartas">
        <h2 th:text="${title}">Sincronizando inventario</h2>
        <p th:text="${message}">Conectando el Sheet con la app y actualizando precios...</p>
        <div class="loading-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>
</body>
</html>
